name: Deploy ALIA UI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & deploy to alia.rald.cloud
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ALIA UI
        run: bun run build

      - name: Show build output structure
        run: |
          echo "=== root dirs ==="
          ls -la | grep "^d"
          for d in .output dist out build; do
            [ -d "$d" ] && echo "=== $d/ ===" && find "$d" -maxdepth 2 | head -20 || true
          done

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Create CF Pages project (idempotent)
        run: |
          wrangler pages project create alia-ui \
            --production-branch=main 2>&1 | grep -v "already exists" || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        run: |
          if   [ -d ".output/public" ]; then DIR=".output/public"
          elif [ -d ".output"        ]; then DIR=".output"
          elif [ -d "dist/public"    ]; then DIR="dist/public"
          elif [ -d "dist"           ]; then DIR="dist"
          else echo "ERROR: no build output found"; exit 1; fi
          echo "Deploying from: $DIR"
          wrangler pages deploy "$DIR" \
            --project-name=alia-ui \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Add alia.rald.cloud custom domain (idempotent)
        run: |
          wrangler pages domain add alia.rald.cloud \
            --project-name=alia-ui 2>&1 | grep -v "already exists" || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true