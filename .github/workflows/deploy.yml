name: Deploy ALIA UI

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & deploy to alia.rald.cloud
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build ALIA UI
        run: bun run build

      - name: Show build output structure
        run: |
          echo "=== root dirs ==="
          ls -la | grep "^d" || true
          for d in .output dist out build; do
            [ -d "$d" ] && echo "=== $d/ ===" && find "$d" -maxdepth 3 | head -30 || true
          done

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare Pages
        run: |
          if   [ -d ".output/public" ]; then DIR=".output/public"
          elif [ -d ".output"        ]; then DIR=".output"
          elif [ -d "dist/public"    ]; then DIR="dist/public"
          elif [ -d "dist"           ]; then DIR="dist"
          else echo "ERROR: no build output found"; exit 1; fi
          echo "Deploying from: $DIR"
          wrangler pages deploy "$DIR" \
            --project-name=alia-ui \
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Auto-detect CF account ID
        id: cf
        run: |
          ACCOUNT_ID=$(curl -s \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" \
            | jq -r '.result[0].id')
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "Account: ${ACCOUNT_ID:0:6}..."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Add alia.rald.cloud custom domain via CF API
        run: |
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${{ steps.cf.outputs.account_id }}/pages/projects/alia-ui/domains" \
            -d '{"name":"alia.rald.cloud"}')
          echo "$RESP" | jq '.'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true